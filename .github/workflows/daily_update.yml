name: Update Tren Desain Harian

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependensi
        run: pip install -r requirements.txt

      - name: Jalankan script pengambil desain
        env:
          UNSPLASH_KEY: ${{ secrets.UNSPLASH_KEY }}
          PEXELS_KEY: ${{ secrets.PEXELS_KEY }}
          PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python fetch_designs.py

      - name: Simpan hasil ke GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/designs.json
          git diff --staged --quiet || git commit -m "Update desain $(date +'%Y-%m-%d')"
          git push
